<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FitLife</title>
  <script>
    // GitHub Pages SPA redirect: store the path and redirect to index.html
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    var redirect = window.location.origin + '/?p=' + encodeURIComponent(path.slice(1)) +
      (search ? '&q=' + encodeURIComponent(search.slice(1)) : '') +
      hash;
    window.location.replace(redirect);
  </script>
</head>
<body></body>
</html>
