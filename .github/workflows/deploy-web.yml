name: Deploy Web

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web export
        env:
          EXPO_PUBLIC_DEMO_MODE: 'false'
          EXPO_PUBLIC_SUPABASE_URL: 'https://ougiouorosrjdmlojrdn.supabase.co'
          EXPO_PUBLIC_SUPABASE_ANON_KEY: 'sb_publishable_y0RDOYemz98VC1quPDC4TA_oxBFEi3E'
          EXPO_PUBLIC_OPENAI_API_KEY: ${{ secrets.EXPO_PUBLIC_OPENAI_API_KEY }}
          EXPO_PUBLIC_YOUTUBE_API_KEY: ${{ secrets.EXPO_PUBLIC_YOUTUBE_API_KEY }}
          EXPO_PUBLIC_USDA_API_KEY: 'DEMO_KEY'
        run: npx expo export --platform web

      - name: Deploy to surge.sh
        run: npx surge dist/ fitlifepro.surge.sh --token ${{ secrets.SURGE_TOKEN }}

